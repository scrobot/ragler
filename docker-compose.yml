services:
  # Backend API
  api:
    image: ghcr.io/scrobot/ragler/backend:latest
    build: ./backend
    ports:
      - "3010:3000"
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - ragler-network

  # Frontend
  frontend:
    image: ghcr.io/scrobot/ragler/frontend:latest
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3010/api
    depends_on:
      - api
    networks:
      - ragler-network

  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ragler-network

  # Session Store
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - ragler-network

  # Redis Insight (optional, for debugging)
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - ragler-network
    profiles:
      - debug

networks:
  ragler-network:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
